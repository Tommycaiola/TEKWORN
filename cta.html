<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deploy CTA — TEKWORN</title>

  <!-- Tailwind CSS via Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom styles & keyframes -->
  <link rel="stylesheet" href="/asset/cta.css" />
</head>
<body class="bg-black flex items-center justify-center min-h-screen m-0 p-0">

  <section
    class="relative w-full bg-black py-20 sm:py-28 md:py-36 px-4 overflow-hidden flex flex-col items-center justify-center gap-8"
    id="ctaSection"
  >
    <!-- Background: grid -->
    <div class="grid-bg"></div>

    <!-- Background: glowing orb -->
    <div class="glow-orb"></div>

    <!-- Background: scan line -->
    <div class="scan-line hidden" id="scanLine"></div>

    <!-- Content -->
    <div class="relative z-10 flex flex-col items-center justify-center gap-8 w-full max-w-[640px]">

      <!-- Terminal log -->
      <div class="h-28 sm:h-32 flex items-end justify-center w-full">
        <div
          class="font-mono text-xs sm:text-sm text-left max-w-md w-full flex flex-col gap-1 select-none"
          id="terminal"
        ></div>
      </div>

      <!-- Main stage -->
      <div class="stage relative flex items-center justify-center h-24 sm:h-32 w-full" id="stage"></div>

      <!-- Progress bar -->
      <div class="w-full max-w-sm mt-4">
        <div class="w-full h-0.5 bg-white/10 rounded-full overflow-hidden">
          <div class="progress-fill h-full rounded-full" id="progressFill"></div>
        </div>
        <div class="flex justify-between mt-2 font-mono text-[10px] sm:text-xs text-white/20">
          <span>init</span>
          <span id="progressPercent">0%</span>
          <span>deploy</span>
        </div>
      </div>

    </div>
  </section>

  <!-- Animation logic -->
  <script src="/asset/app.js"></script>
</body>
</html>
