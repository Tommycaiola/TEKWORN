            transform: translateY(-10vh);
        }

        .scanner-active {
            animation: scan-once 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes scan-once {
            0% { transform: translateY(-10vh); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* Reveal elements */

            opacity: 0;
            transform: translateY(20px);

<script>
        const targetText = document.getElementById('target-text');
        const scanner = document.getElementById('scanner');
        const logo = document.getElementById('revealed-logo');
        const slogan = document.getElementById('revealed-slogan');

        const initialPhrase = "NETWORK";
        const finalPhrase = "TEKWORN";
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        
        let animationSequenceStarted = false;

        function startSequence() {
            if (animationSequenceStarted) return;
            animationSequenceStarted = true;

            // Trigger Scanner
            scanner.classList.add('scanner-active');

            // Monitor scanner position for scramble trigger
            const checkScanner = () => {
                const scannerRect = scanner.getBoundingClientRect();
                const textRect = targetText.getBoundingClientRect();
                
                // Scramble when scanner is passing through the vertical center of the text
                if (scannerRect.bottom > textRect.top + (textRect.height / 2)) {
                    scrambleText();
                    return; 
                }
                requestAnimationFrame(checkScanner);
            };
            requestAnimationFrame(checkScanner);
        }

        function scrambleText() {
            let iteration = 0;
            const scrambleInterval = setInterval(() => {
                targetText.innerText = targetText.innerText
                    .split("")
                    .map((letter, index) => {
                        if (index < iteration) {
                            return finalPhrase[index];
                        }
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                
                if (iteration >= finalPhrase.length) {
                    clearInterval(scrambleInterval);
                    finalizeAnimation();
                }
                iteration += 1 / 4; // Controls the speed of the shuffle "cleanliness"
            }, 40);
        }

        function finalizeAnimation() {
            setTimeout(() => {
                logo.classList.add('active');
                slogan.classList.add('active');
            }, 300);
        }

        // Trigger on load
        window.addEventListener('load', () => {
            setTimeout(startSequence, 600);
        });

        // Mouse parallax effect
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            targetText.style.transform = `translate(${x}px, ${y}px)`;
            logo.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
            slogan.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
        });
    </script>
