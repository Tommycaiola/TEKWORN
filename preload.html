<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Initializing System</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Orbitron:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!--ANIMAZIONI AOS-->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        foreground: '#000000',
                        primary: 'hsl(190, 100%, 50%)', // #00E5FF
                        border: 'hsl(0, 0%, 89%)',
                        'muted-foreground': 'hsl(0, 0%, 40%)',
                    },
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-dots': 'pulseDots 1.5s infinite ease-in-out',
                    },
                    keyframes: {
                        pulseDots: {
                            '0%, 100%': { opacity: '0.2' },
                            '50%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
<style>
        .parallelogram {
            clip-path: polygon(8% 0%, 100% 0%, 92% 100%, 0% 100%);
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(to right, hsla(190, 100%, 50%, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, hsla(190, 100%, 50%, 0.15) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .particle {
            position: absolute;
            background-color: hsl(190, 100%, 50%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes float-particle {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-30px); opacity: 0; }
        }

        .letter-cell {
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        .scanner-line {
            transition: opacity 0.3s ease;
        }
        
        .glitch-overlay {
            animation: glitchFade 0.4s ease-out forwards;
        }

        @keyframes glitchFade {
            0% { opacity: 0.8; filter: blur(2px); transform: translate(2px, -1px); }
            100% { opacity: 0; filter: blur(4px); transform: translate(0, 0); }
        }

        .fade-out {
            transition: opacity 0.8s ease-out;
            opacity: 0;
            pointer-events: none;
        }
        
        .hidden-initial {
            display: none;
        }
    </style>
</head>
<body class="bg-background text-foreground font-body overflow-hidden">
<!-- OVERLAY FULLSCREEN (PRELOAD) -->
<div class="fixed inset-0 z-50 bg-background flex flex-col items-center justify-center" id="preload-overlay">
<!-- Background Grid -->
<div class="absolute inset-0 grid-bg opacity-5 pointer-events-none"></div>
<!-- Particles Container -->
<div class="absolute inset-0 pointer-events-none" id="particles-container"></div>
<!-- Initializing Label -->
<div class="font-body text-[10px] sm:text-xs tracking-[0.5em] uppercase text-muted-foreground mb-6 opacity-0 translate-y-2 transition-all duration-700 ease-out" id="initializing-label">
            Initializing System
        </div>
<!-- Text Transformation Container -->
<div class="relative flex items-center justify-center gap-2 sm:gap-3 md:gap-4 px-4">
<!-- Letters Wrapper -->
<div class="flex gap-2 sm:gap-3 md:gap-4 relative" id="letters-container">
<!-- Letter cells generated by JS -->
</div>
<!-- Scanner Line -->
<div class="absolute top-0 bottom-0 w-[2px] bg-primary z-20 pointer-events-none opacity-0" id="scanner" style="left: -10%;">
<!-- Main Line Glow -->
<div class="absolute inset-0 shadow-[0_0_20px_hsl(190,100%,50%),0_0_60px_hsla(190,100%,50%,0.5),0_0_100px_hsla(190,100%,50%,0.3)]"></div>
<!-- Wide Area Glow -->
<div class="absolute -top-8 -bottom-8 -left-8 w-16 bg-gradient-to-r from-transparent via-primary/10 to-transparent pointer-events-none"></div>
<!-- Top Dot -->
<div class="absolute -top-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-primary rounded-full shadow-[0_0_12px_hsl(190,100%,50%)]"></div>
<!-- Bottom Dot -->
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-primary rounded-full shadow-[0_0_12px_hsl(190,100%,50%)]"></div>
</div>
</div>
<!-- Status Indicator -->
<div class="mt-8 flex items-center gap-2 font-body text-xs tracking-wider uppercase text-muted-foreground" id="status-container">
<span id="status-text">Loading</span>
<div class="flex gap-1">
<span class="w-1 h-1 bg-muted-foreground rounded-full animate-pulse-dots"></span>
<span class="w-1 h-1 bg-muted-foreground rounded-full animate-pulse-dots" style="animation-delay: 0.2s"></span>
<span class="w-1 h-1 bg-muted-foreground rounded-full animate-pulse-dots" style="animation-delay: 0.4s"></span>
</div>
<div class="hidden flex items-center gap-2" id="ready-indicator">
<div class="w-2 h-2 bg-[#4ade80] rounded-full shadow-[0_0_8px_#4ade80]"></div>
</div>
</div>
</div>
<!-- MAIN CONTENT (FINAL SCREEN) -->
<main class="min-h-screen bg-background flex flex-col items-center justify-center opacity-0 transition-opacity duration-1000" id="main-content">
<div class="relative text-center">
<img alt="Logo" class="h-56 md:h-72 lg:h-80 mx-auto w-auto" src="/img/transparent-logo.svg"/>
<h1 class="font-display text-xl md:text-2xl tracking-[0.3em] uppercase text-foreground -mt-4 md:-mt-6 relative z-10" data-aos="fade-up" data-aos-delay="0" data-aos-duration="500">
                Connetti - Automatizza - Scala
            </h1>
</div>
</main>
<script>
        // Constants
        const STRING_START = "NETWORK";
        const STRING_END = "TEKWORN";
        const TOTAL_CHARS = 7;
        const SCAN_DURATION = 2000;
        const PHASES = {
            IDLE: 'idle',
            SCANNING: 'scanning',
            HOLD: 'hold',
            FADEOUT: 'fadeout'
        };

        // State
        let state = {
            phase: PHASES.IDLE,
            startTime: null,
            scanProgress: -10,
            letters: STRING_START.split(''),
            transformed: Array(TOTAL_CHARS).fill(false)
        };

        // DOM Elements
        const overlay = document.getElementById('preload-overlay');
        const mainContent = document.getElementById('main-content');
        const lettersContainer = document.getElementById('letters-container');
        const scanner = document.getElementById('scanner');
        const statusText = document.getElementById('status-text');
        const dots = document.querySelectorAll('.animate-pulse-dots');
        const readyIndicator = document.getElementById('ready-indicator');
        const initializingLabel = document.getElementById('initializing-label');

        // Initialize Letter Cells
        function initLetters() {
            lettersContainer.innerHTML = '';
            state.letters.forEach((char, i) => {
                const cell = document.createElement('div');
                cell.className = `letter-cell relative w-12 h-16 sm:w-16 sm:h-20 md:w-20 md:h-24 border border-border bg-transparent parallelogram flex items-center justify-center`;
                cell.id = `cell-${i}`;
                
                const charEl = document.createElement('span');
                charEl.className = `font-display font-[900] text-2xl sm:text-4xl md:text-5xl tracking-wider text-foreground z-10`;
                charEl.textContent = char;
                charEl.id = `char-${i}`;
                
                cell.appendChild(charEl);
                lettersContainer.appendChild(cell);
            });
        }

        // Particle System
        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `${Math.random() * 100}%`;
                
                const duration = Math.random() * 4 + 3;
                const delay = Math.random() * 5;
                p.style.animation = `float-particle ${duration}s ${delay}s infinite ease-in-out`;
                
                container.appendChild(p);
            }
        }

        // Update Frame
        function update(timestamp) {
            if (state.phase === PHASES.IDLE) return;

            if (!state.startTime) state.startTime = timestamp;
            const elapsed = timestamp - state.startTime;

            if (state.phase === PHASES.SCANNING) {
                // Progress formula: (elapsed / 2000) * 120 - 10
                state.scanProgress = Math.min(110, (elapsed / SCAN_DURATION) * 120 - 10);
                scanner.style.left = `${state.scanProgress}%`;
                scanner.style.opacity = '1';
                statusText.textContent = "Scanning";

                // Letter transformation logic
                for (let i = 0; i < TOTAL_CHARS; i++) {
                    const letterPosPercent = (i / (TOTAL_CHARS - 1)) * 100;
                    const cell = document.getElementById(`cell-${i}`);
                    const charEl = document.getElementById(`char-${i}`);
                    
                    // Transformation trigger
                    if (state.scanProgress >= letterPosPercent && !state.transformed[i]) {
                        state.transformed[i] = true;
                        const newChar = STRING_END[i];
                        
                        // Glitch effect
                        const glitch = document.createElement('span');
                        glitch.className = 'absolute font-display font-[900] text-2xl sm:text-4xl md:text-5xl text-foreground/40 glitch-overlay pointer-events-none';
                        glitch.textContent = charEl.textContent;
                        cell.appendChild(glitch);
                        
                        charEl.textContent = newChar;
                        
                        // Flicker removal of glitch
                        setTimeout(() => glitch.remove(), 400);
                    }

                    // Dynamic styling based on distance to scanner
                    const distance = Math.abs(state.scanProgress - letterPosPercent);
                    if (distance < 15) {
                        cell.style.borderColor = 'hsla(190, 100%, 50%, 0.3)';
                        cell.style.backgroundColor = 'hsla(190, 100%, 50%, 0.05)';
                    } else if (state.transformed[i]) {
                        cell.style.borderColor = 'hsla(190, 100%, 50%, 0.4)';
                        cell.style.backgroundColor = 'hsla(190, 100%, 50%, 0.05)';
                    }
                }

                if (elapsed >= SCAN_DURATION) {
                    state.phase = PHASES.HOLD;
                    state.startTime = timestamp; // Reset for next phase timing
                }
            }

            if (state.phase === PHASES.HOLD) {
                scanner.style.opacity = '0';
                statusText.textContent = "System Ready";
                dots.forEach(dot => dot.style.display = 'none');
                readyIndicator.classList.remove('hidden');
                
                if (timestamp - state.startTime > 1200) {
                    startFadeOut();
                }
            }

            if (state.phase !== PHASES.FADEOUT) {
                requestAnimationFrame(update);
            }
        }

        function startFadeOut() {
            state.phase = PHASES.FADEOUT;
            overlay.classList.add('fade-out');
            mainContent.classList.remove('opacity-0');
            mainContent.classList.add('opacity-100');
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 800);
        }

        // Execution Flow
        window.addEventListener('DOMContentLoaded', () => {
            initLetters();
            createParticles();

            // Timeline starts
            setTimeout(() => {
                initializingLabel.classList.remove('opacity-0', 'translate-y-2');
                initializingLabel.classList.add('opacity-100', 'translate-y-0');
            }, 100);

            // Transition to Scanning after 800ms
            setTimeout(() => {
                state.phase = PHASES.SCANNING;
                requestAnimationFrame(update);
            }, 800);
        });
    </script>
    <script>
        AOS.init({
            once: true,
            easing: 'ease-out',
            duration: 600,
        });
    </script>
</body>
</html>
